<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA LIVE - Iniciar Sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(224, 58, 62, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(224, 58, 62, 0.1) 0%, transparent 50%);
        }

        .auth-container {
            background-color: #1d1d1d;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid #2d2d2d;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 10px;
            font-size: 48px;
        }

        .auth-title {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 5px;
            color: #e03a3e;
        }

        .auth-subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background-color: #2d2d2d;
            border: 2px solid #3d3d3d;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e03a3e;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e03a3e, #c42f33);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(224, 58, 62, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #888;
            font-size: 14px;
        }

        .auth-footer a {
            color: #e03a3e;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background-color: rgba(224, 58, 62, 0.15);
            border: 1px solid #e03a3e;
            color: #ff6b6b;
            display: block;
        }

        .message.success {
            background-color: rgba(46, 204, 113, 0.15);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            display: block;
        }

        @media (max-width: 480px) {
            .auth-container {
                margin: 20px;
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">🏀</div>
        <h1 class="auth-title">NBA LIVE</h1>
        <p class="auth-subtitle">Inicia sesión para entrar a la cancha</p>

        <div id="message" class="message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña" required>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Entrar 🏀</button>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="signup.html">Regístrate gratis</a>
        </div>
    </div>

    <script>
        const API_SERVER = 'http://localhost:3000';

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');

            // Desactivar botón
            submitBtn.disabled = true;
            submitBtn.textContent = 'Entrando...';

            try {
                const response = await fetch(`${API_SERVER}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Error al iniciar sesión');
                }

                // Guardar token en localStorage
                localStorage.setItem('nba_token', data.token);
                localStorage.setItem('nba_user', JSON.stringify(data.user));

                // Mostrar éxito
                messageDiv.className = 'message success';
                messageDiv.textContent = `✅ ¡Bienvenido, ${data.user.username}! Redirigiendo...`;

                // Redirigir a la página NBA
                setTimeout(() => {
                    window.location.href = 'nba.html';
                }, 1500);

            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = `❌ ${error.message}`;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar 🏀';
            }
        }

        // Si ya está logueado, redirigir
        if (localStorage.getItem('nba_token')) {
            window.location.href = 'nba.html';
        }
    </script>
</body>
</html>
